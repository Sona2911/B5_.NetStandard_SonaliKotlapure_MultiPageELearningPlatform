
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Learning Quiz</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background: linear-gradient(270deg,#667eea,#764ba2,#ff758c,#ff7eb3);
background-size:600% 600%;
animation:gradientBG 10s ease infinite;
color:white;
}

@keyframes gradientBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.blob{
position:absolute;
border-radius:50%;
background:rgba(255,255,255,0.1);
filter:blur(40px);
animation:float 8s infinite ease-in-out;
}

.blob1{width:200px;height:200px;top:10%;left:10%;}
.blob2{width:250px;height:250px;bottom:10%;right:10%;}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-30px);}
}

.header{
text-align:center;
padding:20px;
background:rgba(0,0,0,0.3);
backdrop-filter:blur(10px);
}

.quiz-card{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(20px);
border-radius:20px;
padding:30px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
animation:fadeIn 1s ease;
}

.course-btn{
border:none;
border-radius:25px;
padding:10px 20px;
margin:5px;
background:linear-gradient(45deg,#ff7eb3,#ff758c);
color:white;
transition:0.3s;
}

.course-btn:hover{
transform:scale(1.1);
}

.question-box{
background:rgba(255,255,255,0.2);
padding:15px;
border-radius:15px;
margin-top:15px;
}

.result-box{
background:white;
color:black;
padding:20px;
border-radius:15px;
margin-top:20px;
}

.timer{
font-weight:bold;
}

.quick-nav{
position:fixed;
right:20px;
bottom:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.quick-nav a{
width:50px;
height:50px;
background:linear-gradient(45deg,#ff7eb3,#ff758c);
color:white;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
font-size:18px;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
transition:0.3s;
}

.quick-nav a:hover{
transform:scale(1.1);
}

.dark{
background:#121212 !important;
}

.dark .quiz-card,
.dark .question-box{
background:#1e1e1e;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

</style>

</head>

<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<!-- HEADER -->

<div class="header">

<h2><i class="fa-solid fa-pen"></i> Quiz Section</h2>

<button onclick="toggleMode()" class="course-btn">🌙 Mode</button>

</div>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-light bg-light">

<div class="container">

<a class="navbar-brand" href="dashboard.html">Learnify 📚🧑‍💻🎓🧠</a>

<ul class="navbar-nav ms-auto">

<li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
<li class="nav-item"><a class="nav-link active" href="#">Quiz</a></li>
<li class="nav-item"><a class="nav-link" href="courses.html">Courses</a></li>
<li class="nav-item"><a class="nav-link" href="profile.html">Profile</a></li>

</ul>

</div>

</nav>

<!-- (BREADCRUMB) -->

<nav aria-label="breadcrumb" class="container mt-2">
<ol class="breadcrumb">
<li class="breadcrumb-item"><a href="dashboard.html " style="color:white;">Home</a></li>
<li class="breadcrumb-item active" style="color:white;">Quiz</li>
</ol>
</nav>

<!-- MAIN -->

<div class="container mt-4">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="quiz-card text-center">

<h4>Select Course</h4>

<div class="timer mt-2" id="timer">⏱ 60s</div>

<div class="progress mt-2">
<div id="progressBar" class="progress-bar bg-success"></div>
</div>

<button class="course-btn" onclick="startQuiz('web')">Web</button>
<button class="course-btn" onclick="startQuiz('python')">Python</button>
<button class="course-btn" onclick="startQuiz('sql')">SQL</button>
<button class="course-btn" onclick="startQuiz('java')">Java</button>

<hr>

<div id="quizContainer"></div>

<button onclick="submitQuiz()" class="course-btn mt-3">
Submit Quiz
</button>

<div id="result" class="result-box"></div>

</div>

</div>

</div>

</div>

<footer class="text-center mt-5 p-3 bg-dark text-white">
© 2026 Learnify a E-Learning Platform
</footer>

<!-- FLOATING NAV -->

<div class="quick-nav">

<a href="dashboard.html"><i class="fa-solid fa-house"></i></a>
<a href="profile.html"><i class="fa-solid fa-user"></i></a>

</div>

<script src="js/storage.js"></script>
<script src="js/quiz.js"></script>

<script>

function toggleMode(){
document.body.classList.toggle("dark");
}

let time = 60;

setInterval(()=>{
if(time > 0){
time--;
document.getElementById("timer").innerText = "⏱ " + time + "s";
document.getElementById("progressBar").style.width = (time/60*100) + "%";
}
},1000);

</script>

</body>
</html>
