
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>E-Learning Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

/* ======================
ANIMATED BACKGROUND
====================== */

body{
margin:0;
min-height:100vh;
font-family:'Poppins',sans-serif;
background: linear-gradient(270deg,#667eea,#764ba2,#ff758c,#ff7eb3);
background-size:600% 600%;
animation:gradientBG 10s ease infinite;
color:white;
}

@keyframes gradientBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}


/* ======================
HEADER
====================== */

.header{
text-align:center;
padding:20px;
background:rgba(0,0,0,0.3);
backdrop-filter:blur(10px);
}


/* ======================
GLASS CARD
====================== */

.dashboard-card{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
border-radius:20px;
padding:25px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
transition:0.3s;
}

.dashboard-card:hover{
transform:translateY(-8px) scale(1.05);
}


/* ======================
QUIZ CARD
====================== */

.quiz-card{
background:rgba(255,255,255,0.2);
padding:15px;
border-radius:15px;
margin-top:15px;
animation:fadeIn 0.5s ease;
}

.quiz-card:hover{
transform:scale(1.02);
}


/* ======================
AVATAR
====================== */

.avatar{
width:70px;
border-radius:50%;
border:3px solid white;
}


/* ======================
PROGRESS
====================== */

.progress{
height:10px;
border-radius:20px;
}

.progress-bar{
transition:width 1s ease;
}


/* ======================
BUTTONS
====================== */

.btn-custom{
border:none;
border-radius:25px;
padding:8px 20px;
margin:5px;
background:linear-gradient(45deg,#ff7eb3,#ff758c);
color:white;
transition:0.3s;
}

.btn-custom:hover{
transform:scale(1.1);
}


/* ======================
ANIMATION
====================== */

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}


/* DARK MODE */

.dark{
background:#121212 !important;
color:white;
}

.dark .dashboard-card,
.dark .quiz-card{
background:#1e1e1e;
}

</style>

</head>

<body>
<header>
<!-- HEADER -->

<div class="header">

<h2><i class="fa-solid fa-graduation-cap"></i> Dashboard</h2>

<img id="avatar" class="avatar mt-2">

<h4 class="mt-2">
Welcome, <span id="username"></span> 👋
</h4>

<button onclick="toggleMode()" class="btn-custom">🌙 Toggle Mode</button>

<button onclick="logout()" class="btn-custom bg-danger">Logout</button>

</div>
</header>

<!-- NAV -->

<nav class="navbar navbar-expand-lg navbar-light bg-light">

<div class="container">

<a class="navbar-brand" href="#">Learnify 📚🧑‍💻🎓</a>

<ul class="navbar-nav">

<li class="nav-item"><a class="nav-link active" href="#">Dashboard</a></li>
<li class="nav-item"><a class="nav-link" href="courses.html">Courses</a></li>
<li class="nav-item"><a class="nav-link" href="quiz.html">Quiz</a></li>
<li class="nav-item"><a class="nav-link" href="profile.html">Profile</a></li>

</ul>

</div>

</nav>
<!--  BREADCRUMB -->
<nav aria-label="breadcrumb" class="container mt-2">
<ol class="breadcrumb">
<li class="breadcrumb-item"><a href="dashboard.html" style="color:white;">Home</a></li>
<li class="breadcrumb-item active" style="color:white;">Dashboard</li>
</ol>
</nav>
<main class="container mt-4">
<section>
<div class="row g-4">

<div class="col-md-3">
<div class="dashboard-card">
<i class="fa-solid fa-book fa-2x"></i>
<h5>Total Courses</h5>
<h3>8</h3>
</div>
</div>

<div class="col-md-3">
<div class="dashboard-card">
<i class="fa-solid fa-check-circle fa-2x"></i>
<h5>Completed</h5>
<h3 id="completedCourses"></h3>
</div>
</div>

<div class="col-md-3">
<div class="dashboard-card">
<i class="fa-solid fa-rotate fa-2x"></i>
<h5>Attempts</h5>
<h3 id="attempts"></h3>
</div>
</div>

<div class="col-md-3">
<div class="dashboard-card">
<i class="fa-solid fa-chart-line fa-2x"></i>
<h5>Score</h5>
<h3 id="score"></h3>

<div class="progress mt-2">
<div id="progressBar" class="progress-bar bg-success"></div>
</div>
</div>
</div>

</div>


<!-- QUIZ RESULTS -->

<h4 class="mt-5">Recent Results</h4>

<div id="recentResults"></div>
</section>
</main>


<footer class="text-center mt-5 p-3 bg-dark text-white">
© 2026 Learnify a E-Learning Platform
</footer>


<script>

/* LOGIN CHECK */

let username = localStorage.getItem("username");
let avatar = localStorage.getItem("avatar");

if(!username){
window.location.href = "index.html";
}

/* SHOW USER */

document.getElementById("username").innerText = username;
document.getElementById("avatar").src = avatar;


/* DARK MODE */

function toggleMode(){

document.body.classList.toggle("dark");

localStorage.setItem("mode",
document.body.classList.contains("dark") ? "dark":"light");

}

if(localStorage.getItem("mode") === "dark"){
document.body.classList.add("dark");
}


/* LOGOUT */

function logout(){

localStorage.clear();

window.location.href = "index.html";

}


/* LOAD DATA */

// let completedCourses = localStorage.getItem("completedCourses") || 0;

let completedCourses = JSON.parse(localStorage.getItem("completedCourses")) || [];

 let attempts = localStorage.getItem("quizAttempts") || 0;
let score = localStorage.getItem("quizScore") || 0;

// document.getElementById("completedCourses").innerText = completedCourses;

document.getElementById("completedCourses").innerText = completedCourses.length;
document.getElementById("attempts").innerText = attempts;
document.getElementById("score").innerText = score + "%";
document.getElementById("progressBar").style.width = score + "%";


/* QUIZ HISTORY */

let results = JSON.parse(localStorage.getItem("quizResults")) || [];

let container = document.getElementById("recentResults");

results.slice(-3).reverse().forEach(r=>{

container.innerHTML += `
<div class="quiz-card">

<strong>${r.course.toUpperCase()}</strong>

<p>Score: ${r.score}/${r.total}</p>
<p>Percentage: ${r.percentage}%</p>
<p>Grade: ${r.grade}</p>

</div>
`;

});

</script>

</body>
</html>
