
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>E-Learning Platform</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

/* ======================
ANIMATED BACKGROUND
====================== */

body{
margin:0;
height:100vh;
font-family:'Poppins',sans-serif;
background: linear-gradient(270deg,#667eea,#764ba2,#ff758c,#ff7eb3);
background-size:600% 600%;
animation:gradientBG 10s ease infinite;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

@keyframes gradientBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}


/* ======================
FLOATING BLOBS
====================== */

.blob{
position:absolute;
border-radius:50%;
background:rgba(255,255,255,0.15);
filter:blur(40px);
animation:float 8s infinite ease-in-out;
}

.blob1{width:200px;height:200px;top:10%;left:10%;}
.blob2{width:250px;height:250px;bottom:10%;right:10%;animation-delay:2s;}
.blob3{width:150px;height:150px;top:60%;left:60%;animation-delay:4s;}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-30px);}
}


/* ======================
MAIN CONTAINER
====================== */

.main-container{
display:flex;
width:800px;
max-width:95%;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(20px);
border-radius:20px;
overflow:hidden;
box-shadow:0 20px 50px rgba(0,0,0,0.3);
animation:fadeIn 1s ease;
}


/* LEFT SIDE */

.left{
flex:1;
color:white;
padding:40px;
display:flex;
flex-direction:column;
justify-content:center;
}

.typing{
border-right:3px solid white;
white-space:nowrap;
overflow:hidden;
width:0;
animation:typing 3s steps(20) forwards, blink 0.7s infinite;
}

@keyframes typing{
to{width:100%;}
}

@keyframes blink{
50%{border-color:transparent;}
}


/* RIGHT SIDE */

.right{
flex:1;
background:white;
padding:40px;
display:flex;
flex-direction:column;
justify-content:center;
}

/* INPUT */

.input-box input{
width:100%;
padding:10px;
border-radius:25px;
border:1px solid #ccc;
outline:none;
transition:0.3s;
}

.input-box input:focus{
border-color:#764ba2;
box-shadow:0 0 10px rgba(118,75,162,0.5);
}


/* AVATAR */

.avatar{
width:60px;
margin:5px;
cursor:pointer;
border-radius:50%;
border:3px solid transparent;
transition:0.3s;
}

.avatar:hover{
transform:scale(1.1);
}

.selected{
border:3px solid #ff758c;
}


/* BUTTON */

.login-btn{
margin-top:20px;
border:none;
padding:12px;
border-radius:25px;
background:linear-gradient(45deg,#ff7eb3,#ff758c);
color:white;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

.login-btn:hover{
transform:scale(1.1);
box-shadow:0 10px 20px rgba(0,0,0,0.3);
}


/* LOADER */

.loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000000cc;
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
color:white;
z-index:999;
}

.spinner{
width:50px;
height:50px;
border:5px solid white;
border-top:5px solid transparent;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}


/* FADE */

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}


/* RESPONSIVE */

@media(max-width:768px){
.main-container{
flex-direction:column;
}
}

</style>

</head>

<body>

<!-- BLOBS -->

<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>


<!-- MAIN -->

<div class="main-container">

<div class="left">

<h2><i class="fa-solid fa-graduation-cap"></i> Learnify 📚🧑‍💻 </h2>

<h4 class="typing mt-3">Learn. Grow. Succeed.</h4>

<p class="mt-3">
Upgrade your skills with modern courses and track your progress.
</p>

</div>


<div class="right">

<h4 class="text-center">Login</h4>

<div class="input-box">
<input type="text" id="username" placeholder="Enter your name">
</div>

<p class="mt-3 text-center">Select Avatar</p>

<div class="text-center">

<img src="https://cdn-icons-png.flaticon.com/512/4140/4140051.png" class="avatar" onclick="selectAvatar(this)">
<img src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png" class="avatar" onclick="selectAvatar(this)">
<img src="https://cdn-icons-png.flaticon.com/512/1999/1999625.png" class="avatar" onclick="selectAvatar(this)">

</div>

<button onclick="login()" class="login-btn">
Login →
</button>

</div>

</div>


<!-- LOADER -->

<div id="loader" class="loader">
<div class="spinner"></div>
<p class="mt-2">Loading Dashboard...</p>
</div>


<script>

let selectedAvatar = "";

function selectAvatar(img){
document.querySelectorAll(".avatar").forEach(a=>a.classList.remove("selected"));
img.classList.add("selected");
selectedAvatar = img.src;
}

/* ✅ FIXED LOGIN FUNCTION */
function login(){

let name = document.getElementById("username").value;

/* ✅ FIX 1: CLOSE IF BLOCK */
if(!name){
alert("Please enter name");
return;
}

/* SHOW LOADER */
document.getElementById("loader").style.display = "flex";

/* CREATE EMAIL */
let email = name + Math.floor(Math.random()*1000) + "@test.com";

/* API CALL */
fetch("http://localhost:5117/api/users/register", {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify({
  fullName: name,
  email: email,
  password: "123456"
})
})
.then(async res => {
  const text = await res.text();
  try {
    return JSON.parse(text);
  } catch {
    throw new Error(text);
  }
})
.then(data => {

/* ✅ SAVE DATA FOR PROFILE */
localStorage.setItem("userId", data.userId);
localStorage.setItem("username", name);
localStorage.setItem("email", email);   // ✅ IMPORTANT
localStorage.setItem("avatar", selectedAvatar);

/* REDIRECT */
window.location.href = "dashboard.html";

})
.catch(err=>{
alert(err.message);
document.getElementById("loader").style.display = "none";
});

}

</script>

</body>
</html>
